# ??????????????????????????????????????????????????????????????????????????????
# application.properties ? HotelBooking Spring Boot Application
# ??????????????????????????????????????????????????????????????????????????????
#
# HOW TO USE THIS FILE:
#   1. Replace YOUR_DB_PASSWORD with your actual MySQL root or app user password.
#   2. Replace YOUR_DB_USERNAME if you use something other than "root".
#   3. The database "hotelbooking_db" must exist in MySQL before starting:
#        CREATE DATABASE hotelbooking_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   4. Flyway will automatically create all tables on first startup using the
#      SQL migration files in src/main/resources/db/migration/
#
# ??????????????????????????????????????????????????????????????????????????????


# ??? APPLICATION ?????????????????????????????????????????????????????????????

spring.application.name=HotelBooking

# Active profile ? empty means development mode:
#   - NotificationPortStub is active (@Profile("!prod") = all non-prod profiles)
#   - Set to "prod" when deploying to production and Member 1's JWT is integrated
# spring.profiles.active=prod


# ??? SERVER ??????????????????????????????????????????????????????????????????

server.port=8080

# Allow longer URLs (needed for complex query parameters)
server.tomcat.max-http-response-header-size=65536


# ??? DATABASE (MySQL 8+) ??????????????????????????????????????????????????????
#
# !! IMPORTANT: Create the database first before starting the application:
#    mysql -u root -p
#    CREATE DATABASE hotelbooking_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#
# The database name, username and password below must match your MySQL setup.

spring.datasource.url=jdbc:mysql://localhost:3306/hotelbooking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings (HikariCP ? Spring Boot's default pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000


# ??? JPA / HIBERNATE ?????????????????????????????????????????????????????????

# validate = Hibernate checks that your @Entity classes match the DB schema
#            but does NOT create or alter any tables.
#            Flyway is responsible for creating/migrating the schema.
#
# DURING DEVELOPMENT (before you have all Flyway scripts):
#   Use "create-drop" or "update" to let Hibernate manage the schema temporarily:
#   spring.jpa.hibernate.ddl-auto=create-drop
#
# FOR PRODUCTION:
#   Use "validate" so a schema mismatch causes an immediate startup failure
#   (better to fail fast than to corrupt data at runtime).
spring.jpa.hibernate.ddl-auto=update

# Dialect: tells Hibernate which SQL dialect to generate
# MySQL8Dialect generates MySQL 8 compatible SQL (proper UUID, JSON types, etc.)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL in console ? helpful for debugging, turn off in production
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevent the "open session in view" anti-pattern warning
# false = sessions are only open during a @Transactional method, not the whole request
spring.jpa.open-in-view=false

# Batch inserts/updates for better performance with bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# ??? FLYWAY (Database Migration) ?????????????????????????????????????????????
#
# Flyway automatically runs SQL scripts from src/main/resources/db/migration/
# in version order: V1__create_member2_schema_MYSQL.sql, V2__create_booking_module_schema.sql
#
# baseline-on-migrate=true: allows Flyway to work on an existing non-empty database.
# Without this, Flyway fails if tables already exist (e.g. you created them manually).

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# ??? JACKSON (JSON Serialisation) ????????????????????????????????????????????

# Serialize LocalDate as "2026-07-10" (ISO string) instead of a numeric array [2026,7,10]
#spring.jackson.serialization.write-dates-as-timestamps=false

# Serialize LocalDateTime as "2026-07-10T14:23:11" instead of a numeric array
#spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false

# Don't include null fields in JSON responses (cleaner payloads)
# Example: "bookingId": null will be omitted from JSON output
#spring.jackson.default-property-inclusion=non_null

# Accept unknown JSON properties instead of throwing an error
# Useful when the client sends extra fields the server doesn't know about
#spring.jackson.deserialization.fail-on-unknown-properties=false


# ??? SPRING SECURITY ?????????????????????????????????????????????????????????
#
# Security is configured in SecurityConfig.java (com.HotelBook.HotelBooking.config).
# The current configuration PERMITS ALL requests (no login required).
#
# WHY: Member 1 has not delivered the JWT filter yet.
#      Once Member 1's JWT code is integrated, SecurityConfig will be updated
#      to require a valid Bearer token on protected endpoints.
#
# The auto-generated security password that Spring prints on startup is DISABLED
# because SecurityConfig overrides the default configuration.


# ??? SPRINGDOC / SWAGGER UI ??????????????????????????????????????????????????
#
# Swagger UI:   http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
#
# These paths are explicitly permitted in SecurityConfig so you can access
# the docs without authentication.

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false


# ??? ACTUATOR ????????????????????????????????????????????????????????????????
#
# Health endpoint: http://localhost:8080/actuator/health
# Useful for deployment readiness checks.

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized


# ??? LOGGING ?????????????????????????????????????????????????????????????????

# Your application packages ? DEBUG shows all SQL, service calls, etc.
logging.level.com.HotelBook.HotelBooking=DEBUG
logging.level.com.hotelapp=DEBUG

# Hibernate SQL parameter values ? shows ? substituted with real values
# Uncomment for deep SQL debugging:
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security debug ? shows filter chain decisions (noisy but useful)
# Uncomment if endpoints return 403 unexpectedly:
# logging.level.org.springframework.security=DEBUG

# Transaction management debug
# logging.level.org.springframework.transaction=DEBUG

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
