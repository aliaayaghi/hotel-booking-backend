# ==============================================================================
# application.properties ? HotelBooking Spring Boot Application
# ==============================================================================

# APPLICATION
spring.application.name=HotelBooking
spring.profiles.active=local

# SERVER
server.port=8080
server.tomcat.max-http-response-header-size=65536

# DATABASE (MySQL 8+)
# Create DB first: CREATE DATABASE hotelbooking_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JACKSON
#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false is no longer valid
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false

# JWT ? added by Member 1
jwt.secret=/JhEGEJcqn5/R0gwGpcqDhYU+GKVfmzgmZrpLEH5Mus=
jwt.expiration=86400000

# ACTUATOR
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# SWAGGER UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# LOGGING
logging.level.com.hotelapp=DEBUG

# LOGGING ? professional output
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm=WARN
logging.level.org.hibernate.tool.schema=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data=WARN
logging.level.org.springframework.boot.devtools=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.springframework.boot.web=INFO
logging.level.org.hibernate.orm.core=ERROR
logging.level.org.springframework.web.servlet=WARN
# Keep your app logs visible
logging.level.com.HotelBook.HotelBooking=INFO

# Suppress Hibernate DDL output entirely
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false